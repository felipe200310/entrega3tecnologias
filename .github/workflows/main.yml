name: CI/CD Pipeline - Entrega Web 2026

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando Codigo del Repositorio
      uses: actions/checkout@v4

    - name: 2. Configurando Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Instalando Dependencias del Monolito
      run: npm install

    - name: 4. Instalando Dependencias del Microservicio
      run: |
        cd microservicio-proyectos
        npm install

    - name: 5. Construyendo Imagenes Docker
      run: docker compose build

    - name: 6. Desplegando con Escalamiento Horizontal (3 replicas)
      run: docker compose up -d

    - name: 7. Verificando que los servicios estan corriendo
      run: |
        echo "Esperando que los servicios arranquen..."
        sleep 10
        docker ps
        echo "Servicios desplegados correctamente"

    - name: 8. Limpieza de recursos
      if: always()
      run: |
        docker compose down
        docker system prune -f
