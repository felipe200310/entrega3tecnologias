name: CI/CD Pipeline - Entrega Web 2026

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando Código
      uses: actions/checkout@v4

    - name: 2. Configurando Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Instalando Dependencias
      run: npm install

    - name: 4. Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 5. Construyendo y Subiendo Monolito Core
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-core:v1.0, ${{ secrets.DOCKERHUB_USERNAME }}/api-core:latest

    - name: 6. Construyendo y Subiendo Microservicio Proyectos
      uses: docker/build-push-action@v5
      with:
        context: ./microservicio-proyectos
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-proyectos:v1.0, ${{ secrets.DOCKERHUB_USERNAME }}/api-proyectos:latest

    - name: 7. Limpieza de Imágenes Locales (Runner)
      if: always()
      run: docker system prune -f
